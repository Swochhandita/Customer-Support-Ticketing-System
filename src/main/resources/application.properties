# ============================================
# APPLICATION CONFIGURATION

spring.application.name=Customer Support Ticketing System
server.port=8080
server.servlet.context-path=/api

# ============================================
# MYSQL DATABASE CONFIGURATION

# MySQL Connection String
# jdbc:mysql://[host]:[port]/[database]?[options]
spring.datasource.url=jdbc:mysql://localhost:3306/ticket_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=2060
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA/HIBERNATE CONFIGURATION
# ============================================

# MySQL Dialect for Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# DDL Auto: update (Hibernate will create/update tables automatically)
# Options:
# - create: Drop and create tables on each startup
# - update: Update tables if they exist, create if not (BEST FOR DEV)
# - validate: Check schema matches entities (BEST FOR PROD)
# - create-drop: Create tables, drop on shutdown
spring.jpa.hibernate.ddl-auto=update

# Show SQL Queries in Console (helpful for debugging)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ============================================
# MYSQL CONNECTION POOL (HikariCP)


# Maximum concurrent connections
spring.datasource.hikari.maximum-pool-size=20

# Minimum idle connections to maintain
spring.datasource.hikari.minimum-idle=5

# Connection timeout (ms)
spring.datasource.hikari.connection-timeout=30000

# Idle timeout (ms) - close connection if idle for this long
spring.datasource.hikari.idle-timeout=600000

# Maximum lifetime of connection (ms)
spring.datasource.hikari.max-lifetime=1800000

# ============================================
# LOGGING CONFIGURATION

logging.level.root=INFO
logging.level.com.ticketing.system=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ============================================
# SPRING PROFILES
# ============================================

# Active profile (can be: dev, prod, test)
spring.profiles.active=dev

